name: Analytics Service CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'services/analytics-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/analytics-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd services/analytics-service && npm ci

      - name: Run tests
        run: cd services/analytics-service && npm test
        continue-on-error: true

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/analytics-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devpulse-analytics-service:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devpulse-analytics-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Helm lint
        run: helm lint infrastructure/helm/devpulse

      - name: Deploy (placeholder)
        run: |
          echo "Deploy step: kubectl set image deployment/analytics-service analytics-service=${{ secrets.DOCKERHUB_USERNAME }}/devpulse-analytics-service:${{ github.sha }}"
