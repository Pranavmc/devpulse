services:

  postgres:
    image: postgres:16-alpine
    container_name: devpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse123
      POSTGRES_DB: devpulse
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse -d devpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: devpulse-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devpulse-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: devpulse-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: devpulse-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  auth-service:
    build: ./services/auth-service
    container_name: devpulse-auth
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      AUTH_DB_URL: postgresql://devpulse:devpulse123@postgres:5432/devpulse
      JWT_SECRET: superSecretKeyForDevPulse2024ChangeInProd
    depends_on:
      postgres:
        condition: service_healthy

  url-service:
    build: ./services/url-service
    container_name: devpulse-url
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo:27017/urldb
      REDIS_URL: redis://redis:6379
      AUTH_SERVICE_URL: http://auth-service:3001
      KAFKA_BROKER: kafka:9092
      BASE_URL: http://localhost:3002
    depends_on:
      - mongo
      - redis
      - kafka
      - auth-service

  analytics-service:
    build: ./services/analytics-service
    container_name: devpulse-analytics
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      ANALYTICS_DB_URL: postgresql://devpulse:devpulse123@postgres:5432/devpulse
      AUTH_SERVICE_URL: http://auth-service:3001
      KAFKA_BROKER: kafka:9092
    depends_on:
      - postgres
      - kafka

volumes:
  pg_data:
  mongo_data: