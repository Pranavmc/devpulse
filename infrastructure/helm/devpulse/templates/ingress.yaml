{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devpulse-ingress
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "devpulse.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: {{ .Values.authService.port }}
          - path: /api/urls
            pathType: Prefix
            backend:
              service:
                name: url-service
                port:
                  number: {{ .Values.urlService.port }}
          - path: /api/analytics
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: {{ .Values.analyticsService.port }}
          - path: /r
            pathType: Prefix
            backend:
              service:
                name: url-service
                port:
                  number: {{ .Values.urlService.port }}
{{- end }}
