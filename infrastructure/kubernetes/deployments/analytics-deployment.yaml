apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: devpulse
  labels:
    app: analytics-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
        version: v1
    spec:
      containers:
        - name: analytics-service
          image: devpulse-analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: ANALYTICS_DB_URL
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: POSTGRES_URL
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: KAFKA_BROKER
              value: "kafka:9092"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 5
