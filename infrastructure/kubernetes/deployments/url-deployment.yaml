apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-service
  namespace: devpulse
  labels:
    app: url-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: url-service
  template:
    metadata:
      labels:
        app: url-service
        version: v1
    spec:
      containers:
        - name: url-service
          image: devpulse-url-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: MONGO_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: devpulse-secrets
                  key: REDIS_URL
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:3001"
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: BASE_URL
              value: "http://localhost:3002"
            - name: KAFKAJS_NO_PARTITIONER_WARNING
              value: "1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
